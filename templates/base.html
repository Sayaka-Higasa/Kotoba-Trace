<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kotoba Trace{% endblock %}</title>

    <style> 
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #fefce8;
            color: #1f2937; 
            margin: 0;
            padding: 1rem; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
            overflow-x: hidden; /*  横スクロール防止 */
        }

        /* リンク */
        a {
            color: #4ade80;
            text-decoration: underline;
            font-weight: bold;
            transition: 0.2s;
        }
        a:hover {
            color: #22c55e;
            text-decoration: underline;
        }

        /* 共通ボタン */
        .btn {
            display: inline-block;
            padding: 0.75rem 1.25rem; 
            border-radius: 0.5rem;    
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-align: center;
            font-size: 1rem;          
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }

        .btn-primary { background-color: #55d383; color: #000; }
        .btn-danger { background-color: #f87171; color: #000; }
        .btn-secondary { background-color: #e5e7eb; color: #000; }

        /*下部ナビ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-around;
            padding: 0.625rem 0; 
            z-index: 1000;
        }

        .bottom-nav a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #4b5563;
            gap: 0.125rem;
        }

        .bottom-nav a span {
            font-size: 1.25rem; 
        }

        .bottom-nav a small {
            font-size: 0.6875rem; 
            font-weight: bold;    
        }

        /* ヘッダー */
        header {
            text-align: center;
            padding: 1.875rem 0 0.625rem 0;
            background-color: #fefce8;
        }

        header h2 {
            margin: 0;
            font-size: 1.25rem; 
            color: #4b5563;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        /* コンテンツ部分 */
        #content {
            width: 100%;
            max-width: 600px; 
            margin: 0 auto;
            padding-bottom: 5rem; 
        }

        /* メッセージボックス */
        .alert-message {
            padding: 0.25rem 0;
            margin-bottom: 1.25rem;
            font-size: 0.875rem; 
        }

        .alert-message.success{
            color: #55d383;
            font-weight: bold;
        }

        .alert-message.error{
            color: #b91c1c;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            height: 48px;
            width: 80%;
            max-width: 400px;
            padding: 8px;
            font-size: 16px;
            margin-top: 8px;
        }

        input[type="checkbox"] {
            width: auto;
            height: auto;
        }

        a {
            text-decoration: underline;
        }

    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <header>
        <h2>Kotoba Trace</h2>
    </header>

    <div id="content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert-message {{ message.tags}}">
                    {{ message }}
                </div> 
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script>
        function confirmDelete() {
            return confirm("本当に削除してもよろしいですか？");
        }
    </script>

</body>
</html>

{% extends "base.html" %}

{% block title %}ことばを記録する{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 500px;
        margin: 0 auto;
        padding: 1rem;
        text-align: left;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        font-size: 0.9rem;
        display: block;
        font-weight: bold;
        color: #374151; 
        margin-bottom: 8px;
    }

    .form-input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        color: #333; 
    }

    textarea.form-input {
        resize: vertical;
    }

    .save-btn {
    width: 100% !important;    
    display: block;
    padding: 0.75rem;         
    font-weight: bold;         
    font-size: 1rem;           
    border-radius: 0.5rem;      
}
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h3 style="text-align: center; color: #4b5563; margin-bottom: 30px;">ことばを記録する</h3>

    {% if success_message %}
    <p style = "color: #4ade80; font-weight: bold; text-align:center; margin-bottom: 20px">
        {{ success_message }}
    </p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">記録することば</label>
            <textarea name="content" class="form-input" style="height: 120px;" required></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">出典 (本・音楽・日常 など)</label>
            <input type="text" name="source_type" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">作品名、曲名</label>
            <input type="text" name="source_title" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">著者、アーティスト</label>
            <input type="text" name="source_creator" class="form-input">
        </div>

        <div class="form-group">
            <label class="form-label">メモ（非公開）</label>
            <textarea name="memo" class="form-input" style="height: 80px;"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">タグ</label>
            <input type="text" name="tags" class="form-input" placeholder="#夜  #迷ったとき">
        </div>

        <div class="form-group" style="background: #fff; padding: 15px; border-radius: 8px; border: 1px solid #eee;">
            <input type="checkbox" id="is_public" name="is_public" checked>
            <label for="is_public" style="font-weight: bold; color: #374151; cursor: pointer;"> 公開する</label>
            <p style="font-size: 12px; color: #6b7280; margin: 5px 0 0 24px;">※チェックを外すと非公開となります。</p>
        </div>




        <div style="margin-top: 40px;">
            <button type="submit" class="btn btn-primary save-btn">
                保存
            </button>
        </div>
            </form>
        </div>

{% include "nav.html" %}
{% endblock %}

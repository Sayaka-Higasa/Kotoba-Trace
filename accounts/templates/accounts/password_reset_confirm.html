{% extends "base.html" %}

{% block title %}パスワード再設定{% endblock %}

{% block content %}

<div style="text-align:center; margin-top: 2rem;">

    <h2>パスワード再設定</h2>

    {% if error %}
        <p style="color:red; font-size: 0.85rem; margin-top: 1rem;">
            {{ error }}
        </p>
    {% endif %}

    <form method="post" style="margin-top: 1.5rem;">
        {% csrf_token %}

        <div style="margin-bottom: 1.5rem;">
            <label style="font-size: 0.85rem;">
                新しいパスワード(10文字以上、英数字を含む)
            </label><br>

            <input type="password" name="password"
                style="width: 100%; max-width: 300px; padding: 0.6rem; margin-top: 0.5rem; border: 1px solid #ddd; border-radius: 0.5rem;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="font-size: 0.85rem;">
                新しいパスワード(確認)
            </label><br>

            <input type="password" name="password_confirm"
                style="width: 100%; max-width: 300px; padding: 0.6rem; margin-top: 0.5rem; border: 1px solid #ddd; border-radius: 0.5rem;">
        </div>

        <button type="submit" class="btn btn-primary" style="font-size: 0.9rem;">
            変更
        </button>

    </form>

</div>

{% endblock %}

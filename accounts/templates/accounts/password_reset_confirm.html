{% extends "base.html" %}

{% block title %}パスワード再設定{% endblock %}

{% block extra_css %}
<style>
    /* ログイン画面と共通のコンテナ設定 */
    .form-container {
        width: 92% !important;
        max-width: 31.25rem !important;
        margin: 0 auto !important;
        text-align: left !important;
    }

    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
    }

    .form-label {
        display: block;
        font-weight: bold;
        color: #374151;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
    }

    /* タイトル：ログイン画面と合わせる */
    .reset-title {
        text-align: center;
        color: #4b5563;
        margin-top: 2.5rem;
        margin-bottom: 2rem;
        font-size: 1.25rem;
    }

    /* 入力欄：base.htmlの指定を強制的に上書きするために !important を使用 */
    .form-container input[type="password"] {
        width: 100% !important;
        max-width: none !important;
        height: auto !important; /* baseの48px指定をリセットしたい場合 */
        display: block !important;
        box-sizing: border-box !important;
        padding: 0.75rem !important;
        font-size: 1rem !important;
        border: 1px solid #ddd !important;
        border-radius: 0.5rem !important;
        margin: 0 auto !important;
    }

    /* エラーリスト：ログイン画面と共通 */
    .errorlist {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0 0 0;
        text-align: left;
    }

    .errorlist li {
        color: #b91c1c; 
        font-weight: bold;
        font-size: 0.875rem;
    }

    /* ボタン：ログイン画面の login-btn と同じサイズ・太さ */
    .save-btn {
        width: 100% !important;
        display: block !important;
        padding: 0.75rem !important;
        font-weight: bold !important;
        font-size: 0.9375rem !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    
    <div class="reset-title">
        <h2>パスワード再設定</h2>
    </div>

    <form method="post" novalidate>
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">新しいパスワード (10文字以上、英数字を含む)</label>
            <input type="password" name="password" required>
            
            {% if error %}
                <ul class="errorlist">
                    <li>{{ error }}</li>
                </ul>
            {% endif %}
        </div>

        <div class="form-group">
            <label class="form-label">新しいパスワード (確認)</label>
            <input type="password" name="password_confirm" required>
        </div>

        <div style="margin-top: 2.5rem;">
            <button type="submit" class="btn btn-primary save-btn">
                変更
            </button>
        </div>
    </form>
</div>
{% endblock %}

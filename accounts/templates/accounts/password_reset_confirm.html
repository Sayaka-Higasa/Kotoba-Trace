{% extends "base.html" %}

{% block title %}パスワード再設定{% endblock %}

{% block extra_css %}
<style>
    /* ログイン画面と完全に共通のコンテナ設定 */
    .form-container {
        width: 92% !important;
        max-width: 31.25rem !important;
        margin: 0 auto !important;
        text-align: left !important;
    }

    .form-group {
        margin-bottom: 1.5rem;
        text-align: left;
        position: relative; /* 目のアイコンの基準 */
    }

    .form-label {
        display: block;
        font-weight: bold;
        color: #374151;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
    }

    .reset-title {
        text-align: center;
        color: #4b5563;
        margin-top: 2.5rem;
        margin-bottom: 2rem;
        font-size: 1.25rem;
    }

    /* 入力欄：ログイン画面と共通の高さ・パディング */
    .form-container input[type="password"],
    .form-container input[type="text"] {
        width: 100% !important;
        box-sizing: border-box !important;
        height: 3.25rem !important;        
        padding: 0 3rem 0 0.75rem !important; 
        font-size: 16px !important;       
        line-height: 3.25rem !important;   
        border: 1px solid #ddd !important;
        border-radius: 0.5rem !important;
        display: block !important;
        background-color: #fff !important;
        font-family: inherit !important;
    }
    .password-toggle-btn {
        position: absolute;
        right: 0 !important;
        top: 0 !important; /* 1.8rem から 0 に変更 */
        width: 3rem !important;
        height: 100% !important; /* 3.25rem から 100% に変更 */
        background: none !important;
        border: none !important;
        color: #9ca3af;
        cursor: pointer;
        display: flex !important;
        align-items: center;
        justify-content: center;
        z-index: 10;
        outline: none !important;
    }

    .errorlist {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0 0 0;
    }

    .errorlist li {
        color: #b91c1c; 
        font-weight: bold;
        font-size: 0.875rem;
    }

    /* ボタン：ログイン画面の login-btn と同じ */
    .save-btn {
        width: 100% !important;
        display: block !important;
        padding: 0.75rem !important;
        font-weight: bold !important;
        font-size: 0.9375rem !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="reset-title">
        <h2>パスワード再設定</h2>
    </div>

    <form method="post" novalidate id="reset-form">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">新しいパスワード (10文字以上)</label>
            <div style="position: relative; height: 3.25rem;"> 
                <input type="password" name="password" id="id_password" required
                       autocomplete="new-password" autofocus inputmode="text">
                <button type="button" class="password-toggle-btn" data-target="id_password" tabindex="-1">
                    <span class="material-icons">visibility_off</span>
                </button>
            </div>
            {% if error %}
                <ul class="errorlist">
                    <li>{{ error }}</li>
                </ul>
            {% endif %}
        </div>

        <div class="form-group">
            <label class="form-label">新しいパスワード (確認)</label> <div style="position: relative; height: 3.25rem;"> 
                <input type="password" name="password_confirm" id="id_password_confirm" required 
                       autocomplete="new-password" inputmode="text"> <button type="button" class="password-toggle-btn" data-target="id_password_confirm" tabindex="-1">
                    <span class="material-icons">visibility_off</span>
                </button>
            </div>
        </div>

        <div style="margin-top: 2.5rem;">
            <button type="submit" class="btn btn-primary save-btn">
                変更
            </button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('reset-form');
    const saveBtn = document.querySelector('.save-btn');
    const firstInput = document.getElementById('id_password');

    // 1. 自動フォーカス
    if (firstInput) {
        setTimeout(() => firstInput.focus(), 300);
    }

    // 2. 目のアイコン切り替え（ログイン画面のロジックを拡張）
    const toggles = document.querySelectorAll('.password-toggle-btn');
    toggles.forEach(btn => {
        btn.addEventListener('click', function() {
            const targetId = this.getAttribute('data-target');
            const input = document.getElementById(targetId);
            const eyeIcon = this.querySelector('.material-icons');

            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            
            // アイコン文字の切り替え（Material Icons）
            eyeIcon.innerText = isPassword ? 'visibility' : 'visibility_off';
            
            // 色の切り替え（ログイン画面と同じ青とグレー）
            this.style.color = isPassword ? '#3b82f6' : '#9ca3af';
        });
    });

    // 3. 送信中の連打防止
    if (form && saveBtn) {
        form.addEventListener('submit', function() {
            if (form.checkValidity()) {
                saveBtn.innerText = '変更中...';
                saveBtn.style.opacity = '0.7';
                saveBtn.style.pointerEvents = 'none';
                saveBtn.style.cursor = 'not-allowed';
            }
        });
    }
});
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}メールアドレス変更{% endblock %}

{% block content %}

    <div style="text-align:center;">
        <h2>メールアドレス変更</h2>
        <form method = "POST">
        {% csrf_token %}

        <p>現在のメールアドレス<br>
            {{ request.user.email }}
        </p>
        
        <p>新しいメールアドレス</p>
        <input type = "email" name = "email"><br><br>

        <button type = "submit">変更</button>
    </form>
    {% endblock %}

{% extends "base.html" %}

{% block title %}メールアドレス変更 - Kotoba Trace{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        width: 92%;
        max-width: 31.25rem;
        margin: 0 auto;
        text-align: left;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        font-weight: bold;
        color: #374151;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
    }

    .form-input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.75rem;
        font-size: 1rem;
        border: 1px solid #ddd;
        border-radius: 0.5rem;
        color: #333;
        background-color: #fff;
    }

    .current-email {
        font-size: 1rem;
        color: #6b7280;
        padding: 0.5rem 0;
        border-bottom: 1px solid #e5e7eb;
        margin-bottom: 1.5rem;
    }

    .save-btn {
        display: inline-block;
        min-width: 7rem;      
        padding: 0.6rem 1.5rem;
        font-size: 0.9375rem; 
    }

    /* メッセージ用 */
    .messages {
        margin-bottom: 1.5rem;
    }
    .messages .error {
        color: #b91c1c;  /* 赤 */
        font-weight: bold;
        margin-bottom: 0.5rem;
    }
    .messages .success {
        color: #16a34a;  /* 緑 */
        font-weight: bold;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div style="margin-bottom: 1rem;">
        <a href="javascript:history.back()" class="btn btn-secondary" style="font-size: 0.875rem; padding: 0.5rem 1rem;">
            戻る
        </a>
    </div>

    <h2 style="text-align: center; color: #4b5563; margin-bottom: 2rem; font-size: 1.25rem;">メールアドレス変更</h2>



    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label class="form-label">現在のメールアドレス</label>
            <div class="current-email">{{ request.user.email }}</div>
        </div>
        
        <div class="form-group">
            <label class="form-label">新しいメールアドレス</label>
            <input type="email" name="email" class="form-input" required >
        </div>

        <div style="text-align: center; margin-top: 2.5rem;">
            <button type="submit" class="btn btn-primary save-btn">
                保存
            </button>
        </div>
    </form>
</div>

{% include "nav.html" %}
{% endblock %}

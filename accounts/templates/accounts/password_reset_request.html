{% extends "base.html" %}

{% block title %}パスワードリセット{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        width: 92% !important;
        max-width: 31.25rem !important;
        margin: 0 auto !important;
        text-align: left !important;
    }

    .reset-title {
        text-align: center;
        color: #4b5563;
        margin-top: 2.5rem;
        margin-bottom: 2rem;
        font-size: 1.25rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        font-weight: bold;
        color: #374151;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
    }

    .form-container input[type="email"] {
        width: 100% !important;
        max-width: none !important;
        display: block !important;
        box-sizing: border-box !important;
        padding: 0.75rem !important;
        font-size: 1rem !important;
        border: 1px solid #ddd !important;
        border-radius: 0.5rem !important;
        margin: 0 auto !important;
    }

    .reset-btn {
        width: 100% !important;
        display: block !important;
        padding: 0.75rem !important;
        font-weight: bold !important;
        font-size: 0.9375rem !important;
        margin-bottom: 1rem;
    }

    .link-group {
        text-align: center;
        margin-top: 1.5rem;
    }

    /* ログイン画面に戻るリンクのスタイル */
    .link-group a {
        color: #6b7280; 
        font-size: 0.875rem;
    }


</style>
{% endblock %}

{% block content %}
<div class="form-container">
    
    <div class="reset-title">
        <h3>パスワードを忘れた場合</h3>
    </div>

    <p style="font-size: 0.9rem; line-height: 1.6; text-align: center; color: #6b7280; margin-bottom: 2rem;">
        パスワードをリセットします。<br>
        登録しているメールアドレスを<br>入力してください。
    </p>

    <form method="post" novalidate>
        {% csrf_token %}

        {% if error %}
            <ul class="errorlist" style="list-style: none; padding: 0; margin-bottom: 1rem; color: #b91c1c; font-weight: bold; text-align: center;">
                <li>{{ error }}</li>
            </ul>
        {% endif %}

        <div class="form-group">
            <label class="form-label">メールアドレス</label>
            <input type="email" name="email" required>   
        </div>

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary reset-btn">
                再設定メールを送信
            </button> 
        </div>

        <div class="link-group">
            <a href="{% url 'accounts:login' %}">ログイン画面に戻る</a>
        </div>
    </form>
</div>
{% endblock %}

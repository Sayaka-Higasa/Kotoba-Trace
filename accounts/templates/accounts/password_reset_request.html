{% extends "base.html" %}

{% block title %}パスワードリセット{% endblock %}


{% block extra_css %}
<style>
.alert-message {
    background: #fee;
    color: #b91c1c;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}
</style>
{% endblock %}

{% block content %}
<div style="text-align:center; margin-top: 2rem;">
    
    <h3>パスワードを忘れた場合</h3>

    <p style="font-size: 0.9rem; line-height: 1.6;">
        パスワードをリセットします。<br>
        登録しているメールアドレスを<br>入力してください。
    </p>

    <form method="post" novalidate style="margin-top: 1.5rem;">
        {% csrf_token %}
        {% if error %}
            <div class="alert-message">
                {{ error }}
            </div>
        {% endif %}


        <label style="font-size: 0.85rem;">メールアドレスを入力</label><br>

        <input type="email" name="email"
            style="width: 100%; max-width: 300px; padding: 0.6rem; margin-top: 0.5rem; border: 1px solid #ddd; border-radius: 0.5rem;"><br><br>

        <button type="submit" class="btn btn-primary" style="font-size: 0.9rem;">
            パスワード再設定メール送信
        </button><br><br>

        <a href="{% url 'accounts:login' %}" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.5rem 1rem;">
            戻る
        </a>

    </form>

</div>

{% endblock %}

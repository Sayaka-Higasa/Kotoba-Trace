{% extends "base.html" %}

{% block title %}メール送信完了{% endblock %}

{% block content %}

<div style="text-align:center; margin-top: 2rem;">

    <h2>メールをご確認ください</h2>

    <p style="font-size: 0.9rem; line-height: 1.6; margin-top: 1rem;">
        ご登録用のメールアドレス宛に<br>パスワード設定用のリンクを<br>送信しました。<br>
        メールをご確認の上、パスワード<br>再設定をお願いいたします
    </p>

    <div style="margin-top: 2rem;">
        <a href="{% url 'accounts:login' %}" class="btn btn-secondary" style="font-size: 0.9rem; padding: 0.6rem 1.5rem;">
            戻る
        </a>
    </div>

</div>

{% endblock %}

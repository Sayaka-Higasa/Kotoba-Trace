<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset= "UTF-8">
        <title>新規登録 </title>       
    </head>

<body>
    <header>
        <h1 style="text-align:center">Kotoba Trace</h1>
    </header>
    <div  style = "text-align: center">
        
    <form method="post">
    {% csrf_token %}

    {% for error in form.password1.errors %}
        <p style="color: red">{{error}}</p>
    {% endfor %}


    <p>
    <label for = "id_username">ユーザー名</label><br>
    {{form.username}}
    </p>

    <p>
    <label for = "id_email">メールアドレス</label><br>
    {{form.email}}
    </p>

    <p>
    <label for = "id_password1">パスワード</label><br>
    {{form.password1}}
    </p>

    <p>
    <label for = "id_password2">パスワード再入力</label><br>
    {{form.password2}}
    </p>

    <p>
    <button type = "submit">登録</button>
    </p>


    </form>


    </div>
